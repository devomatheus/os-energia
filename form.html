<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Ordem de Serviço
        </title>

        <!-- Bootstrap 5 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <style>
            /* PDF: coluna ~180 mm (680 px a 96 dpi); fonte menor — jsPDF/html2canvas inflava com host 794 px */
            #pdfCaptureHost {
                width: 680px !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
                overflow-wrap: anywhere !important;
                word-break: break-word !important;
            }
            #pdfCaptureHost,
            #pdfCaptureHost * {
                font-size: 5pt !important;
                line-height: 1.15 !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
            }
            #pdfCaptureHost #pdfCaptureTitle {
                font-size: 5.25pt !important;
                font-weight: 600 !important;
                margin: 0 0 4pt !important;
            }
            #pdfCaptureHost ul,
            #pdfCaptureHost ol {
                padding-left: 1.1em !important;
                margin: 0 0 0.4em !important;
            }
            #pdfCaptureHost .font-monospace {
                white-space: normal !important;
                word-break: break-all !important;
            }
        </style>
    </head>
    <body class="bg-body-tertiary">
        <main class="container py-4 py-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h1 class="h3 mb-1">
                                    Ordem de Serviço
                                </h1>
                                <p class="text-body-secondary mb-0">
                                    Confira os dados e registre suas atividades.
                                </p>
                            </div>

                            <div id="infoOrdem" class="alert alert-info mb-4" role="status" aria-live="polite">
                                <div class="d-flex align-items-start gap-2">
                                    <div class="flex-grow-1">
                                        <div class="fw-semibold mb-1">Informações da OS</div>
                                        <div class="small text-body-secondary">
                                            Eletricista: <span id="infoEletricista" class="fw-semibold text-body">—</span><br>
                                            Obra: <span id="infoObra" class="fw-semibold text-body">—</span>
                                        </div>
                                        <div class="mt-2 pt-2 border-top small">
                                            <span class="text-body-secondary">Total acumulado das selecionadas:</span>
                                            <span id="totalSelecionadoAcumulado" class="fw-semibold text-body ms-1">0</span>
                                        </div>
                                    </div>
                                    <a href="./index.html" class="btn btn-sm btn-outline-primary align-self-start">
                                        Trocar
                                    </a>
                                </div>
                            </div>

                            <div class="accordion" id="accordionAtividades">
                                <p class="text-body-secondary small mb-0 px-1" id="accordionAtividadesStatus">
                                    Carregando atividades…
                                </p>
                            </div>

                            <div class="d-grid d-sm-flex gap-2 justify-content-sm-end mt-4">
                                <a href="./index.html" class="btn btn-outline-secondary">
                                    Voltar
                                </a>
                                <button type="button" class="btn btn-primary" id="btnSalvar" disabled>
                                    Salvar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal (Bootstrap) -->
        <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title" id="alertModalTitle">
                            Atenção
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>
                    <div class="modal-body pt-2">
                        <div id="alertModalBody" class="text-body-secondary"></div>
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-primary" id="btnAlertModalEnviarPdf">
                            Enviar PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Área para o PDF: fora do modal (sem transform). Durante a geração o script move para a tela — html2canvas costuma rasterizar vazio se estiver em left:-9999px. -->
        <div
            id="pdfCaptureHost"
            aria-hidden="true"
            style="position: fixed; left: 0; top: 0; width: 680px; max-width: 100vw; padding: 0; box-sizing: border-box; background: #fff; color: #212529; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 5pt; line-height: 1.15; z-index: -1; pointer-events: none; opacity: 0; visibility: hidden; max-height: 100vh; overflow: auto;"
        >
            <h2 id="pdfCaptureTitle"></h2>
            <div id="pdfCaptureBody"></div>
        </div>

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

        <!-- Bootstrap 5 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

        <!-- PDF: html2canvas + jsPDF (doc.html usa html2canvas) -->
        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>

        <script>
            $(function () {
                const alertModalEl = document.getElementById("alertModal");
                const alertModal = new bootstrap.Modal(alertModalEl, { backdrop: "static" });
                let alertModalPermitirImpressaoPdf = false;

                /** WhatsApp para onde enviar o resumo: só dígitos (DDI + DDD + número). Ex.: 5511987654321 */
                const WHATSAPP_DESTINO_DIGITOS = "5549998236226";

                function abrirWhatsAppAposPdf(nomeArquivoPdf) {
                    const digitos = String(WHATSAPP_DESTINO_DIGITOS || "").replace(/\D/g, "");
                    if (digitos.length < 10) {
                        return;
                    }
                    const obra = $("#infoObra").text().trim();
                    const eletricista = $("#infoEletricista").text().trim();
                    const texto =
                        "Olá! Acabei de baixar o PDF do resumo da ordem de serviço.\n\n" +
                        "Arquivo: " +
                        nomeArquivoPdf +
                        "\nObra: " +
                        obra +
                        "\nEletricista: " +
                        eletricista;
                    const url = "https://wa.me/" + digitos + "?text=" + encodeURIComponent(texto);
                    window.location.assign(url);
                }

                function showAlertModal(title, message) {
                    alertModalPermitirImpressaoPdf = false;
                    $("#alertModalTitle").text(title);
                    $("#alertModalBody").text(message);
                    alertModal.show();
                }

                function showModalHtml(title, html) {
                    alertModalPermitirImpressaoPdf = true;
                    $("#alertModalTitle").text(title);
                    $("#alertModalBody").html(html);
                    alertModal.show();
                }

                function nomeArquivoPdfSeguro(obra) {
                    const base = String(obra || "obra")
                        .trim()
                        .replace(/\s+/g, "-")
                        .replace(/[^a-zA-Z0-9._\-]/g, "_")
                        .slice(0, 80);
                    const hoje = new Date();
                    const d = String(hoje.getDate()).padStart(2, "0");
                    const m = String(hoje.getMonth() + 1).padStart(2, "0");
                    const y = hoje.getFullYear();
                    return "OS-" + base + "-" + d + "-" + m + "-" + y + ".pdf";
                }

                $("#btnAlertModalEnviarPdf").on("click", function () {
                    const $btn = $(this);
                    if (!alertModalPermitirImpressaoPdf) {
                        alertModal.hide();
                        return;
                    }
                    const JSPDF = window.jspdf && window.jspdf.jsPDF;
                    if (typeof JSPDF !== "function" || typeof html2canvas !== "function") {
                        window.alert(
                            "Não foi possível carregar html2canvas ou jsPDF. Verifique sua conexão com a internet e recarregue a página."
                        );
                        return;
                    }

                    const titulo = $("#alertModalTitle").text().trim() || "Resumo";
                    const corpoHtml = $("#alertModalBody").html();
                    const nomeArquivo = nomeArquivoPdfSeguro($("#infoObra").text());

                    $btn.prop("disabled", true);
                    const textoOriginal = $btn.text();
                    $btn.text("Gerando PDF…");

                    $("#pdfCaptureTitle").text(titulo);
                    $("#pdfCaptureBody").html(corpoHtml);

                    const hostEl = document.getElementById("pdfCaptureHost");
                    const estiloOculto = hostEl.getAttribute("style") || "";
                    const estiloCaptura =
                        "position:fixed;left:0;top:0;width:680px;max-width:100vw;padding:0;box-sizing:border-box;background:#fff;color:#212529;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:5pt;line-height:1.15;z-index:2147483000;max-height:100vh;overflow:auto;pointer-events:auto;opacity:1;visibility:visible;";
                    const $overlay = $("<div>", {
                        id: "pdfGenOverlay",
                        css: {
                            position: "fixed",
                            inset: 0,
                            background: "rgba(33, 37, 41, 0.35)",
                            zIndex: 2147482999,
                        },
                    });
                    $("body").append($overlay);
                    hostEl.setAttribute("style", estiloCaptura);

                    function restaurarHostPdf() {
                        $("#pdfGenOverlay").remove();
                        hostEl.setAttribute("style", estiloOculto);
                    }

                    window.requestAnimationFrame(function () {
                        window.requestAnimationFrame(function () {
                            window.setTimeout(function () {
                                const doc = new JSPDF({ unit: "mm", format: "a4", orientation: "portrait" });
                                const margemMm = 15;
                                const larguraPagina = doc.internal.pageSize.getWidth() - margemMm * 2;
                                const pdfWindowWidthPx = 680;

                                const htmlResult = doc.html(hostEl, {
                                    x: margemMm,
                                    y: margemMm,
                                    width: larguraPagina,
                                    windowWidth: pdfWindowWidthPx,
                                    html2canvas: {
                                        scale: 0.72,
                                        useCORS: true,
                                        allowTaint: true,
                                        logging: false,
                                        backgroundColor: "#ffffff",
                                        scrollX: 0,
                                        scrollY: 0,
                                    },
                                    callback: function (pdf) {
                                        pdf.save(nomeArquivo);
                                        restaurarHostPdf();
                                        alertModal.hide();
                                        $btn.prop("disabled", false).text(textoOriginal);
                                        abrirWhatsAppAposPdf(nomeArquivo);
                                    },
                                });
                                if (htmlResult != null && typeof htmlResult.catch === "function") {
                                    htmlResult.catch(function (err) {
                                        console.error(err);
                                        restaurarHostPdf();
                                        window.alert("Não foi possível gerar o PDF. Tente novamente.");
                                        $btn.prop("disabled", false).text(textoOriginal);
                                    });
                                }
                            }, 120);
                        });
                    });
                });

                let ordemServico = null;
                try {
                    ordemServico = JSON.parse(sessionStorage.getItem("ordemServico") || "null");
                } catch (e) {
                    ordemServico = null;
                }

                if (!ordemServico || !ordemServico.nomeEletricista || !ordemServico.numeroObra) {
                    $("#infoOrdem").removeClass("alert-info").addClass("alert-warning");
                    $("#infoEletricista").text("—");
                    $("#infoObra").text("—");
                    $("#accordionAtividades").empty();
                    showAlertModal(
                        "Ordem de serviço não encontrada", "Volte ao início e inicie uma ordem de serviço para carregar os dados aqui."
                    );
                    return;
                }

                $("#infoEletricista").text(ordemServico.nomeEletricista);
                $("#infoObra").text(ordemServico.numeroObra);

                const formatQtd = new Intl.NumberFormat("pt-BR", {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 3,
                });

                function lerQuantidadeInput($qtdIn) {
                    let quantidade = parseInt(String($qtdIn.val()), 10);
                    if (!Number.isFinite(quantidade) || quantidade < 1) {
                        quantidade = 1;
                        $qtdIn.val("1");
                    }
                    return quantidade;
                }

                function quantidadeParaSoma($qtdIn) {
                    let q = parseInt(String($qtdIn.val()), 10);
                    if (!Number.isFinite(q) || q < 1) {
                        q = 1;
                    }
                    return q;
                }

                function atualizarTotalAcumulado() {
                    let total = 0;
                    $("#accordionAtividades input[type='checkbox'][name='ativ[]']:checked").each(function () {
                        const $cb = $(this);
                        const $qtdIn = $cb.closest("label").find("input.js-qtd-atividade");
                        const qndUmd = Number($cb.data("qnd-umd") || 0);
                        total += qndUmd * quantidadeParaSoma($qtdIn);
                    });
                    $("#totalSelecionadoAcumulado").text(formatQtd.format(total));
                }

                $("#accordionAtividades").on("change", "input[type='checkbox'][name='ativ[]']", function () {
                    atualizarTotalAcumulado();
                });
                $("#accordionAtividades").on("input change", "input.js-qtd-atividade", function () {
                    const $cb = $(this).closest("label").find("input[type='checkbox'][name='ativ[]']");
                    if ($cb.is(":checked")) {
                        atualizarTotalAcumulado();
                    }
                });

                function escHtml(s) {
                    return String(s)
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/\"/g, "&quot;")
                        .replace(/'/g, "&#039;");
                }

                function montarAccordionAtividades(grupos) {
                    const $root = $("#accordionAtividades").empty();
                    grupos.forEach(function (grupo, gi) {
                        const hi = gi + 1;
                        const headingId = "accHeading" + hi;
                        const collapseId = "accCollapse" + hi;
                        const $item = $("<div>", { class: "accordion-item" });
                        const $header = $("<h2>", { class: "accordion-header", id: headingId });
                        const $btn = $("<button>", {
                            class: "accordion-button collapsed",
                            type: "button",
                            "data-bs-toggle": "collapse",
                            "data-bs-target": "#" + collapseId,
                            "aria-expanded": "false",
                            "aria-controls": collapseId,
                        }).text(grupo.tipo || "");
                        $header.append($btn);
                        const $collapse = $("<div>", {
                            id: collapseId,
                            class: "accordion-collapse collapse",
                            "aria-labelledby": headingId,
                            "data-bs-parent": "#accordionAtividades",
                        });
                        const $body = $("<div>", { class: "accordion-body p-0" });
                        const $list = $("<div>", { class: "list-group list-group-flush" });
                        const atividadesOrdenadas = (grupo.atividades || [])
                            .slice()
                            .sort(function (a, b) {
                                const ta = (a.atividade || "").toString();
                                const tb = (b.atividade || "").toString();
                                return ta.localeCompare(tb, "pt-BR", { sensitivity: "base" });
                            });
                        atividadesOrdenadas.forEach(function (ativ, ai) {
                            const cbId = "ativ-" + gi + "-" + ai;
                            const itemCodigo =
                                ativ.item != null && ativ.item !== "" ? String(ativ.item) : "";
                            const valorCb = itemCodigo || "sem-item:" + gi + ":" + ai;
                            const qndUmd = ativ.qnd_umd != null && ativ.qnd_umd !== "" ? Number(ativ.qnd_umd) : 0;
                            const $label = $("<label>", {
                                class:
                                    "list-group-item list-group-item-action d-flex align-items-start gap-3 cursor-pointer mb-0",
                                for: cbId,
                            });
                            const $cb = $("<input>", {
                                class: "form-check-input flex-shrink-0 mt-1",
                                type: "checkbox",
                                id: cbId,
                                name: "ativ[]",
                                value: valorCb,
                                "data-tipo": grupo.tipo || "",
                                "data-item": itemCodigo,
                                "data-atividade": ativ.atividade || "",
                                "data-qnd-umd": String(qndUmd),
                            });
                            const $row = $("<div>", {
                                class:
                                    "d-flex flex-column flex-sm-row flex-grow-1 gap-2 align-items-sm-start",
                            });
                            const $itemCell = $("<span>", {
                                class: "font-monospace small text-body-secondary",
                                style: "min-width: 6rem",
                            }).text(itemCodigo || "—");
                            const $textCell = $("<span>", {
                                class: "flex-grow-1 text-body small text-break",
                            })
                                .css("white-space", "pre-line")
                                .text(ativ.atividade || "");
                            const $qtdInput = $("<input>", {
                                class: "form-control form-control-sm flex-shrink-0 js-qtd-atividade",
                                type: "number",
                                min: "1",
                                step: "1",
                                value: "1",
                                inputmode: "numeric",
                                "aria-label": "Quantidade",
                                title: "Quantidade",
                                style: "width: 4.25rem; max-width: 100%",
                            });
                            $qtdInput.on("click mousedown pointerdown", function (e) {
                                e.stopPropagation();
                            });
                            $qtdInput.on("blur change", function () {
                                let v = parseInt(String($(this).val()), 10);
                                if (!Number.isFinite(v) || v < 1) {
                                    v = 1;
                                }
                                $(this).val(String(v));
                                const $cbLinha = $(this).closest("label").find("input[type='checkbox'][name='ativ[]']");
                                if ($cbLinha.is(":checked")) {
                                    atualizarTotalAcumulado();
                                }
                            });
                            const $qtdBadge = $("<span>", {
                                class: "badge text-bg-secondary rounded-pill flex-shrink-0 align-self-center ms-auto",
                                title: "qnd_umd",
                            }).text(formatQtd.format(qndUmd));
                            $row.append($itemCell, $textCell, $qtdInput, $qtdBadge);
                            $label.append($cb, $row);
                            $list.append($label);
                        });
                        $body.append($list);
                        $collapse.append($body);
                        $item.append($header, $collapse);
                        $root.append($item);
                    });
                }

                function gerarResumoSelecao() {
                    const selecionadas = $("#accordionAtividades input[type='checkbox'][name='ativ[]']:checked")
                        .toArray()
                        .map(function (el) {
                            const $el = $(el);
                            const $label = $el.closest("label");
                            const $qtdIn = $label.find("input.js-qtd-atividade");
                            const quantidade = lerQuantidadeInput($qtdIn);
                            const qndUmd = Number($el.data("qnd-umd") || 0);
                            return {
                                tipo: $el.data("tipo") || "",
                                item: $el.data("item") || "",
                                atividade: $el.data("atividade") || "",
                                qndUmd: qndUmd,
                                quantidade: quantidade,
                            };
                        });

                    if (!selecionadas.length) {
                        showAlertModal("Nenhuma atividade selecionada", "Marque pelo menos uma atividade antes de salvar.");
                        return;
                    }

                    const porTipo = new Map();
                    let totalGeral = 0;
                    selecionadas.forEach(function (a) {
                        if (!porTipo.has(a.tipo)) {
                            porTipo.set(a.tipo, { tipo: a.tipo, soma: 0, atividades: [] });
                        }
                        const g = porTipo.get(a.tipo);
                        g.atividades.push(a);
                        g.soma += a.qndUmd;
                        totalGeral += a.qndUmd;
                    });

                    const grupos = Array.from(porTipo.values()).sort(function (a, b) {
                        return String(a.tipo).localeCompare(String(b.tipo), "pt-BR", { sensitivity: "base" });
                    });

                    const nome = ordemServico.nomeEletricista || "—";
                    const obra = ordemServico.numeroObra || "—";

                    const partes = [];
                    partes.push('<div class="mb-3">');
                    partes.push('<div><strong>Eletricista:</strong> ' + escHtml(nome) + "</div>");
                    partes.push('<div><strong>Obra:</strong> ' + escHtml(obra) + "</div>");
                    partes.push("</div>");

                    partes.push('<div class="mb-3">');
                    partes.push('<div class="fw-semibold mb-2">Atividades selecionadas</div>');
                    grupos.forEach(function (g) {
                        partes.push('<div class="mb-3">');
                        partes.push('<div class="fw-semibold">' + escHtml(g.tipo) + "</div>");
                        partes.push('<ul class="mb-2">');
                        g.atividades
                            .slice()
                            .sort(function (a, b) {
                                return String(a.atividade).localeCompare(String(b.atividade), "pt-BR", { sensitivity: "base" });
                            })
                            .forEach(function (a) {
                                const itemTxt = a.item ? '<span class="font-monospace text-body-secondary">' + escHtml(a.item) + "</span>" : '<span class="text-body-secondary">—</span>';
                                const qtdUmdTxt = formatQtd.format(a.qndUmd || 0);
                                const qtdInTxt = formatQtd.format(a.quantidade || 1);
                                partes.push(
                                    "<li>" +
                                        itemTxt +
                                        " — " +
                                        escHtml(a.atividade) +
                                        ' <span class="text-body-secondary">(qtd: ' +
                                        escHtml(qtdInTxt) +
                                        "; qnd_umd: " +
                                        escHtml(qtdUmdTxt) +
                                        ")</span></li>"
                                );
                            });
                        partes.push("</ul>");
                        partes.push('<div class="small text-body-secondary"><strong>Soma do tipo:</strong> ' + escHtml(formatQtd.format(g.soma)) + "</div>");
                        partes.push("</div>");
                    });
                    partes.push("</div>");

                    partes.push('<div class="pt-2 border-top">');
                    partes.push('<div class="fw-semibold">Total geral: ' + escHtml(formatQtd.format(totalGeral)) + "</div>");
                    partes.push("</div>");

                    showModalHtml("Resumo", partes.join(""));
                }

                fetch("./app.json")
                    .then(function (r) {
                        if (!r.ok) {
                            throw new Error("HTTP " + r.status);
                        }
                        return r.json();
                    })
                    .then(function (grupos) {
                        if (!Array.isArray(grupos)) {
                            throw new Error("Formato inválido em app.json");
                        }
                        montarAccordionAtividades(grupos);
                        $("#btnSalvar").prop("disabled", false);
                        atualizarTotalAcumulado();
                    })
                    .catch(function (err) {
                        $("#accordionAtividades").html(
                            '<p class="text-danger small mb-0 px-1">Não foi possível carregar <strong>app.json</strong>. Confira se o arquivo está na mesma pasta e, se necessário, use um servidor local (por exemplo <code class="small">python -m http.server</code>) para evitar bloqueio do navegador.</p>'
                        );
                        $("#btnSalvar").prop("disabled", true);
                        atualizarTotalAcumulado();
                        console.error(err);
                    });

                $("#btnSalvar").on("click", function () {
                    gerarResumoSelecao();
                });
            });
        </script>
    </body>
</html>
