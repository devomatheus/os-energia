<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre suas atividades</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-body-tertiary">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7 col-xl-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 mb-1">Registre suas atividades</h1>
                            <p class="text-body-secondary mb-0">
                                Preencha os dados abaixo para iniciar uma nova ordem de serviço.
                            </p>
                        </div>

                        <form id="form-obra" novalidate>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="nomeEletricista" class="form-label">
                                        Nome do eletricista
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="nomeEletricista"
                                        name="nomeEletricista"
                                        placeholder="Ex.: Matheus Silva"
                                        autocomplete="name"
                                        required
                                    >
                                    <div class="invalid-feedback">
                                        Informe o nome do eletricista.
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label for="numeroObra" class="form-label">
                                        Número da obra
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="numeroObra"
                                        name="numeroObra"
                                        placeholder="Ex.: 2026-0001"
                                        inputmode="numeric"
                                        required
                                    >
                                    <div class="invalid-feedback">
                                        Informe o número da obra.
                                    </div>
                                </div>

                                <div class="col-12 d-grid d-sm-flex gap-2 justify-content-sm-end mt-3">
                                    <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                                    <button type="submit" class="btn btn-primary">
                                        Iniciar Ordem de Serviço
                                    </button>
                                </div>
                            </div>
                        </form>

                        <div id="resultado" class="alert alert-success mt-4 d-none" role="status" aria-live="polite"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de alerta (estilo SweetAlert, usando Bootstrap) -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="alertModalTitle">Atenção</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body pt-2">
                    <div id="alertModalBody" class="text-body-secondary"></div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                        Continuar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        $(function () {
            const $form = $("#form-obra");
            const $resultado = $("#resultado");
            const alertModalEl = document.getElementById("alertModal");
            const alertModal = new bootstrap.Modal(alertModalEl, { backdrop: "static" });

            function showAlertModal(title, message, onClose) {
                $("#alertModalTitle").text(title);
                $("#alertModalBody").text(message);

                if (typeof onClose === "function") {
                    $(alertModalEl).one("hidden.bs.modal", function () {
                        onClose();
                    });
                }

                alertModal.show();
            }

            $form.on("submit", function (e) {
                e.preventDefault();

                const formEl = this;
                if (!formEl.checkValidity()) {
                    e.stopPropagation();
                    $form.addClass("was-validated");
                    $resultado.addClass("d-none").text("");
                    showAlertModal("Campos obrigatórios", "Preencha o nome do eletricista e o número da obra para iniciar a ordem de serviço.");
                    return;
                }

                const nomeEletricista = $("#nomeEletricista").val().toString().trim();
                const numeroObra = $("#numeroObra").val().toString().trim();

                sessionStorage.setItem(
                    "ordemServico",
                    JSON.stringify({
                        nomeEletricista,
                        numeroObra,
                        criadoEm: new Date().toISOString()
                    })
                );

                $resultado
                    .removeClass("d-none")
                    .text(`Ordem de serviço iniciada! Eletricista: ${nomeEletricista} | Obra: ${numeroObra}`);

                showAlertModal("Tudo certo", "Ordem de serviço iniciada.", function () {
                    window.location.href = "./form.html";
                });
            });

            $form.on("reset", function () {
                $form.removeClass("was-validated");
                $resultado.addClass("d-none").text("");
            });
        });
    </script>
</body>
</html>
